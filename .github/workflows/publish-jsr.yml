name: Publish to JSR

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'deno.json'
      - 'deno.lock'
      - 'README.md'
      - '.github/workflows/publish-jsr.yml'
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC authentication with JSR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install npm dependencies for publish
        run: deno install

      - name: Publish to JSR
        run: deno publish
